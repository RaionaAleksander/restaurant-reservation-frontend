<div class="max-w-md mx-auto p-4 border rounded-lg shadow">
  <h2 class="text-lg font-bold mb-4">Create Reservation</h2>

  <div *ngIf="errorMessage" class="mb-4 p-2 bg-red-100 text-red-800 rounded">
    {{ errorMessage }}
  </div>

  <div class="mb-2">
    <label class="block text-sm font-medium mb-1">Customer Name</label>
    <input type="text" [(ngModel)]="customerName" class="w-full border rounded px-2 py-1" />
  </div>

  <div class="mb-2">
    <label class="block text-sm font-medium mb-1">Start Time</label>
    <input type="datetime-local" [(ngModel)]="startTime" class="w-full border rounded px-2 py-1" />
  </div>

  <div class="mb-2">
    <label class="block text-sm font-medium mb-1">End Time</label>
    <input type="datetime-local" [(ngModel)]="endTime" class="w-full border rounded px-2 py-1" />
  </div>

  <div class="mb-2">
    <label class="block text-sm font-medium mb-1">Party Size</label>
    <input type="number" [(ngModel)]="partySize" min="1" class="w-full border rounded px-2 py-1" />
  </div>

  <div class="mb-4">
    <label for="tableId" class="block text-sm font-medium text-gray-700 mb-1">
        Table ID
    </label>
    <input
        id="tableId"
        type="number"
        [(ngModel)]="tableId"
        min="1"
        placeholder="Enter table number"
        class="block w-full border rounded-lg px-2 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
    />
  </div>

  <button
    class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 disabled:bg-gray-400"
    [disabled]="!customerName || !startTime || !endTime || !partySize || !selectedTable"
    (click)="submit()"
  >
    Create Reservation
  </button>
</div>
