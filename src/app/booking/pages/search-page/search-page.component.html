<div class="search-page max-w-6xl mx-auto p-4">

  <app-booking-form
    (search)="updateFilteredTables($event)">
  </app-booking-form>

  <app-floor-plan
    [tables]="filteredTables"
    [recommendMode]="recommendMode">
  </app-floor-plan>

  <div class="mt-8">

    <h2 class="text-lg font-semibold mb-3">
      Tables overview
    </h2>

    <div class="overflow-x-auto border rounded-lg">

      <table class="min-w-full text-sm text-left">

        <thead class="bg-gray-100 text-gray-700">
          <tr>
            <th class="px-3 py-2">Table</th>
            <th class="px-3 py-2">Zone</th>
            <th class="px-3 py-2">Capacity</th>
            <th class="px-3 py-2">Features</th>
            <th class="px-3 py-2">Coordinates</th>
          </tr>
        </thead>

        <tbody>

          @for (table of allTables; track table.id) {

          <tr class="border-t hover:bg-gray-50">

            <td class="px-3 py-2 font-bold">
              {{ table.tableNumber }}
            </td>

            <td class="px-3 py-2" [ngClass]="getZoneClass(table.zone)">
              {{ formatZone(table.zone) }}
            </td>

            <td class="px-3 py-2">
              {{ table.capacity }}
            </td>

            <td class="px-3 py-2">
              {{ getFeatures(table) }}
            </td>

            <td class="px-3 py-2 text-gray-500">
              ({{ table.posX }}, {{ table.posY }})
            </td>

          </tr>

          }

        </tbody>

      </table>

    </div>

  </div>

</div>
